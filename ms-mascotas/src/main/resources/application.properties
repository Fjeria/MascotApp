# Nombre del microservicio (como se verá en Eureka)
spring.application.name=ms-mascotas

# Puerto en el que correrá este servicio
server.port=8083

# Configuración de la Base de Datos (Base de datos propia: db_pacientes)
spring.datasource.url=jdbc:mysql://localhost:3306/db_pacientes?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración del Cliente Eureka (Para que el Gateway lo encuentre)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/